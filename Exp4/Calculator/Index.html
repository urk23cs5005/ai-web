<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>Simple calculator</h1>
        
        <div class="input-group">
            <input type="number" id="num1" placeholder="NUMBER 1">
            <input type="number" id="num2" placeholder="NUMBER 2">
        </div>

        <div class="button-group">
            <!-- Using onclick event as requested -->
            <button class="op-btn" onclick="calculate('add')">+ Add</button>
            <button class="op-btn" onclick="calculate('sub')">- Subtract</button>
            <button class="op-btn" onclick="calculate('div')">/ Divide</button>
            <button class="op-btn" onclick="calculate('mul')">* Multiply</button>
        </div>

        <div class="result-group">
            <input type="text" id="result" placeholder="Result" readonly>
            <button id="clear-btn" onclick="clearFields()">Clear</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
